  name: A tall IKEA employee
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed: 3.5
    baseSprintSpeed: 3.5
  - type: UseDelay
    delay: 5
  - type: UseDelayOnMeleeHit
  - type: MeleeThrowOnHit
    stunTime: 0.2
    activateOnThrown: true
    distance: -1
    speed: 7
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcClaw
    attackRate: 0.5
    range: 2.5
    damage:
      types:
        Blunt: 3
        Structural: 5
  - type: NpcFactionMember
    factions: [ "SCPs" ]
  - type: TimedDespawn
    lifetime: 300.1
  - type: TimedSpawner
    prototypes:
    - TallScp3008
    intervalSeconds: 300
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: NPCRetaliation
    _enabled: false
  - type: AmbientSound
    volume: -7
