- type: entity
  parent: BaseItem
  id: Scp3008MusicBox
  name: radio IKEA
  description: Soothing music comes from it.
  components:
  - type: Sprite
    sprite: _Scp/Objects/Devices/radio.rsi
    state: common
  - type: Item
    sprite: _Scp/Objects/Devices/radio.rsi
    heldPrefix: walkietalkie
  - type: AmbientSound
    range: 75
    volume: -13
    sound:
      path: /Audio/_Scp/Scp3008/IKEA.ogg
  - type: ScpRadio
    enabled: true
    microphoneEnabled: false
    channels:
    - Common
    activeChannel: Common
    wattageReceiveMessage: 0
    wattageSendMessage: 0
    listenRange: 0
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium

- type: entity
  id: BaseScp3008
  suffix: SCP-3008
  description: A disproportionate and faceless person in an IKEA employee suit.
  parent:
  - MobCombat
  - SimpleMobBase
  abstract: true
  components:
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavSmash: !type:Bool
        true
      NavPry: !type:Bool
        true
  - type: NPCRetaliation
    attackMemoryLength: 10
  - type: FactionException
  - type: NpcFactionMember
    factions:
    - Passive
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]


- type: entity
  id: BasicScp3008
  parent: BaseScp3008
  name: IKEA employee
  components:
  - type: Sprite
    sprite: _Scp/Mobs/Scp/scp-3008/basic.rsi
    state: Basic3008
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.5
    baseSprintSpeed: 2.5
  - type: NpcFactionMember
    factions: [ "Neutral" ]
  - type: TimedDespawn
    lifetime: 600.1
  - type: TimedSpawner
    prototypes:
    - BasicScp3008Angry
    intervalSeconds: 600
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
        Structural: 20

- type: entity
  id: BasicScp3008Angry
  parent: BasicScp3008
  name: IKEA employee
  suffix: SCP-3008 ANGRY
  components:
  - type: NpcFactionMember
    factions: [ "SCPs" ]
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3
  - type: TimedDespawn
    lifetime: 300.1
  - type: TimedSpawner
    prototypes:
    - BasicScp3008
    intervalSeconds: 300
  - type: NPCRetaliation
